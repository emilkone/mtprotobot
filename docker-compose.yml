services:
  mtproto_1:
    image: telegrammessenger/proxy:latest
    container_name: mtproto_1
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      # container listens on 443; avoid host 443 if xray/VLESS uses it (default 4443)
      - "4443:443"
    env_file:
      - ./data/mtproto/slot_1.env

  mtproto_2:
    image: telegrammessenger/proxy:latest
    container_name: mtproto_2
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8443:443"
    env_file:
      - ./data/mtproto/slot_2.env

  mtproto_3:
    image: telegrammessenger/proxy:latest
    container_name: mtproto_3
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "2053:443"
    env_file:
      - ./data/mtproto/slot_3.env

  mtproto_4:
    image: telegrammessenger/proxy:latest
    container_name: mtproto_4
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "2083:443"
    env_file:
      - ./data/mtproto/slot_4.env

  mtproto_5:
    image: telegrammessenger/proxy:latest
    container_name: mtproto_5
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "2096:443"
    env_file:
      - ./data/mtproto/slot_5.env

  app:
    build:
      context: ./app
    container_name: mtprotobot_app
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
      - ./data:/workspace/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.ssh/vps2_ssh_key:/run/secrets/vps2_ssh_key:ro
    depends_on:
      - mtproto_1
      - mtproto_2
      - mtproto_3
      - mtproto_4
      - mtproto_5
